name: Release plugin

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches manifest
        shell: bash
        run: |
          VERSION="$(node -p "require('./manifest.json').version")"
          if [ "$VERSION" != "${GITHUB_REF_NAME}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match manifest version ${VERSION}."
            exit 1
          fi

      - name: Build
        run: npm run build

      - name: Build Android package
        shell: bash
        run: |
          mkdir -p android-package/sts-indentation
          cp main.js manifest.json styles.css android-package/sts-indentation/
          cd android-package
          zip -r "../STS-indentation-android-${GITHUB_REF_NAME}.zip" sts-indentation

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes \
            main.js \
            manifest.json \
            styles.css \
            "STS-indentation-android-${GITHUB_REF_NAME}.zip"
